name: 打包 React 项目
on:
  push:
    branches: [ main, master ]  # 明确指定触发分支
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: 构建与部署
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: 检查仓库 📦
        uses: actions/checkout@v4
      
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # GitHub Actions 稳定版本
          cache: 'npm'
      
      - name: 缓存依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
            build
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      
      - name: 安装依赖
        run: |
          npm ci --prefer-offline --no-audit
          echo "✅ 依赖安装完成"
      
      - name: 构建项目
        run: |
          echo "当前工作目录: $(pwd)"
          echo "目录内容:"
          ls -la
          
          npm run build
          
          echo "构建后目录内容:"
          ls -la
          
          echo "检查 build 文件夹:"
          if [ -d "build" ]; then
            echo "✅ build 文件夹存在"
            ls -la build/
            echo "build 文件夹大小:"
            du -sh build/
          else
            echo "❌ build 文件夹不存在"
            echo "尝试查找其他构建输出:"
            find . -name "index.html" -o -name "static" 2>/dev/null
            exit 1
          fi
      
      - name: 添加 .nojekyll
        run: |
          touch build/.nojekyll
          echo "CNAME" >> build/CNAME
        if: false  # 有自定义域名时改为 true
      
      - name: 检查 CI 端的 lockfile
        run: |
            cat package-lock.json | grep yaml@2.8.3 || echo "❌ CI端没有 yaml@2.8.3"
            npm hash-files package-lock.json
      
      - name: 🛠️ 调试：打印目录结构
        run: |
            pwd
            ls -R 
      
      - name: 部署到 GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: build
          clean: true
          clean-exclude: |
            .nojekyll
            CNAME