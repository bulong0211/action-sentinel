name: 打包 React 项目
on: push

permissions:
    contents: write

jobs:
    npm-build:
        name: npm-build 工作
        runs-on: ubuntu-latest
        steps:
        - name: 读取仓库内容 📖
          uses: actions/checkout@v4
        
        - name: 设置 Node.js 环境 ⚙️
          uses: actions/setup-node@v4
          with:
            node-version: '25'   # 改成你 package.json 里的引擎版本
            cache: 'npm'
        
        - name: 安装依赖、项目打包 📦
          run: 
            npm install
            npm run build
        
        - name: 部署 🚀
          uses: JamesIves/github-pages-deploy-action@v4
          with:
            branch: gh-pages
            folder: build